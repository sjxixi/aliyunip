<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿里云 IP 管理工具</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>阿里云 IP 管理工具</h1>
            <div class="steps-indicator">
                <div class="step step-1 active" data-step="1">
                    <span class="step-number">1</span>
                    <span class="step-label">配置认证</span>
                </div>
                <div class="step step-2" data-step="2">
                    <span class="step-number">2</span>
                    <span class="step-label">选择资源</span>
                </div>
                <div class="step step-3" data-step="3">
                    <span class="step-number">3</span>
                    <span class="step-label">配置 IP</span>
                </div>
                <div class="step step-4" data-step="4">
                    <span class="step-number">4</span>
                    <span class="step-label">执行配置</span>
                </div>
            </div>
        </header>

        <main>
            <div class="step-content step-1-content active" id="step1">
                <h2>步骤 1: 配置阿里云认证</h2>
                <div class="form-group">
                    <label for="access-key-id">AccessKey ID</label>
                    <input type="text" id="access-key-id" placeholder="请输入 AccessKey ID">
                </div>
                <div class="form-group">
                    <label for="access-key-secret">AccessKey Secret</label>
                    <input type="password" id="access-key-secret" placeholder="请输入 AccessKey Secret">
                </div>
                <div class="form-group">
                    <label for="region">区域 (Region)</label>
                    <input type="text" id="region" placeholder="请输入区域，如 cn-hangzhou" value="cn-shanghai-finance-1">
                </div>
                <div class="button-group">
                    <button class="btn-primary" id="validate-btn">验证并继续</button>
                </div>
                <div class="message" id="step1-message"></div>
            </div>

            <div class="step-content step-2-content" id="step2">
                <h2>步骤 2: 选择要配置的资源</h2>
                <div class="loading" id="resources-loading">
                    <div class="spinner"></div>
                    <p>正在加载资源列表...</p>
                </div>
                <div class="resources-container" id="resources-container" style="display: none;">
                    <div class="resource-section" data-section="alb">
                        <div class="section-header" onclick="toggleSection('alb')">
                            <h3>ALB 访问策略</h3>
                            <span class="toggle-btn" id="toggle-alb">▼</span>
                        </div>
                        <div class="section-content" id="content-alb">
                            <div class="resource-list two-columns" id="alb-list"></div>
                        </div>
                    </div>
                    <div class="resource-section" data-section="ecs">
                        <div class="section-header" onclick="toggleSection('ecs')">
                            <h3>ECS 安全组</h3>
                            <span class="toggle-btn" id="toggle-ecs">▼</span>
                        </div>
                        <div class="section-content" id="content-ecs">
                            <div class="resource-list two-columns" id="sg-list"></div>
                        </div>
                    </div>
                    <div class="resource-section" data-section="rds">
                        <div class="section-header" onclick="toggleSection('rds')">
                            <h3>RDS 实例</h3>
                            <span class="toggle-btn" id="toggle-rds">▼</span>
                        </div>
                        <div class="section-content" id="content-rds">
                            <div class="resource-list two-columns" id="rds-list"></div>
                        </div>
                    </div>
                    <div class="resource-section" data-section="polardb">
                        <div class="section-header" onclick="toggleSection('polardb')">
                            <h3>PolarDB 集群</h3>
                            <span class="toggle-btn" id="toggle-polardb">▼</span>
                        </div>
                        <div class="section-content" id="content-polardb">
                            <div class="resource-list two-columns" id="polardb-list"></div>
                        </div>
                    </div>
                    <div class="resource-section" data-section="redis">
                        <div class="section-header" onclick="toggleSection('redis')">
                            <h3>Redis 实例</h3>
                            <span class="toggle-btn" id="toggle-redis">▼</span>
                        </div>
                        <div class="section-content" id="content-redis">
                            <div class="resource-list two-columns" id="redis-list"></div>
                        </div>
                    </div>
                    <div class="resource-section" data-section="cloudfw">
                        <div class="section-header" onclick="toggleSection('cloudfw')">
                            <h3>云防火墙地址簿</h3>
                            <span class="toggle-btn" id="toggle-cloudfw">▼</span>
                        </div>
                        <div class="section-content" id="content-cloudfw">
                            <div class="resource-list two-columns" id="cloudfw-list"></div>
                        </div>
                    </div>
                </div>
                <div class="selected-summary" id="selected-summary" style="display: none;">
                    <h3>已选择的资源</h3>
                    <div id="selected-list"></div>
                </div>
                <div class="button-group">
                    <button class="btn-secondary" id="step2-back">返回上一步</button>
                    <button class="btn-primary" id="step2-next">下一步</button>
                </div>
                <div class="message" id="step2-message"></div>
            </div>

            <div class="step-content step-3-content" id="step3">
                <h2>步骤 3: 配置 IP 地址</h2>
                <div class="selected-resources-preview" id="selected-preview"></div>
                <div class="form-group">
                    <label for="ip-input">IP 地址</label>
                    <input type="text" id="ip-input" placeholder="请输入 IP 地址或 CIDR，如 192.168.1.100 或 192.168.1.0/24">
                    <div class="error" id="ip-error"></div>
                </div>
                <div class="form-group">
                    <label for="port-input">端口号 (仅 ECS 安全组)</label>
                    <input type="text" id="port-input" placeholder="请输入端口号，如 8080（留空则开放所有端口）">
                    <div class="error" id="port-error"></div>
                </div>
                <div class="form-group">
                    <label for="description-input">备注 (仅 ALB)</label>
                    <input type="text" id="description-input" placeholder="请输入备注信息（仅对 ALB 有效）">
                </div>
                <div class="button-group">
                    <button class="btn-secondary" id="step3-back">返回上一步</button>
                    <button class="btn-primary" id="step3-next">下一步</button>
                </div>
                <div class="message" id="step3-message"></div>
            </div>

            <div class="step-content step-4-content" id="step4">
                <h2>步骤 4: 执行配置</h2>
                <div class="execution-preview" id="execution-preview"></div>
                <div class="button-group">
                    <button class="btn-secondary" id="step4-back">返回上一步</button>
                    <button class="btn-primary" id="execute-btn">开始执行</button>
                </div>
                <div class="execution-progress" id="execution-progress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <div class="progress-text" id="progress-text">正在执行...</div>
                </div>
                <div class="execution-results" id="execution-results" style="display: none;">
                    <h3>执行结果</h3>
                    <div id="results-list"></div>
                </div>
                <div class="button-group" id="restart-group" style="display: none;">
                    <button class="btn-primary" id="restart-btn">重新开始</button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
